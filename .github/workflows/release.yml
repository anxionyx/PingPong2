name: Cross-Compile and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'

permissions:
  contents: write

jobs:
  # STEP 1: Determine version and create the release first
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.determine_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version Tag
        id: determine_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
            echo "version=v0.1.${COMMIT_COUNT}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        id: create_gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.determine_version.outputs.version }}
          name: Release ${{ steps.determine_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # STEP 2: Build and safely upload to the existing release
  build-and-upload:
    name: Build (${{ matrix.target }})
    needs: create-release # Ensures the release exists before compiling
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Targets (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

          # Termux / Android Target
          - os: ubuntu-latest
            target: aarch64-linux-android

          # MacOS Targets
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

          # Windows Targets
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Install Linkers & Tools (Linux Only)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          # Install mold specifically for native x86_64 performance
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            sudo apt-get install -y mold
          # Install the explicit cross-compiler toolchain for generic Linux aarch64
          elif [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build Binary (Standard/Linux/macOS)
        if: matrix.os != 'windows-latest' && matrix.target != 'aarch64-linux-android'
        shell: bash
        run: |
          mkdir dist
          
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            # Safe to use Mold natively on host platform
            RUSTFLAGS="-C link-arg=-fuse-ld=mold" cargo build --release --target ${{ matrix.target }}
          elif [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            # Direct Cargo to use the dedicated aarch64 cross-linker we installed
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="aarch64-linux-gnu-gcc"
            cargo build --release --target ${{ matrix.target }}
          else
            # macOS targets
            cargo build --release --target ${{ matrix.target }}
          fi
          
          cp target/${{ matrix.target }}/release/PingPong dist/PingPong-${{ matrix.target }}

      - name: Build Binary (Android/Termux)
        if: matrix.target == 'aarch64-linux-android'
        run: |
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang"
          cargo build --release --target ${{ matrix.target }}
          mkdir dist
          cp target/${{ matrix.target }}/release/PingPong dist/PingPong-${{ matrix.target }}

      - name: Build Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }}
          mkdir dist
          cp target/${{ matrix.target }}/release/PingPong.exe dist/PingPong-${{ matrix.target }}.exe

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
