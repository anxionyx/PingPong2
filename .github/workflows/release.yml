name: Cross-Compile and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release Draft/Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.determine_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version Tag
        id: determine_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # Automatically generate fallback version if pushing directly to main
            # Counts commits to cleanly structure an auto-incrementing release version
            COMMIT_COUNT=$(git rev-list --count HEAD)
            echo "version=v0.1.${COMMIT_COUNT}" >> $GITHUB_OUTPUT
          fi

  build-and-upload:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl

          # MacOS Targets (Native cross compilation supported on macos-latest)
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

          # Windows Targets
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install MUSL Tools (Linux only)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Run Cross-Compilation & Upload to Release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: terminal_pong
          target: ${{ matrix.target }}
          ref: refs/tags/${{ needs.create-release.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    name: Finalize GitHub Release Notes
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          name: Release ${{ needs.create-release.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true # Auto-extracts commit logs and PRs into release documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
